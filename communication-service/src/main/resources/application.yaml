server:
  port: ${COMMUNICATION-SERVICE-PORT:3001}
  servlet:
    context-path: /${SERVICE_PREFIX:}

spring:
  application:
    name: COMMUNICATION-SERVICE
  main:
    banner-mode: off
  jackson:
    default-property-inclusion: non_null
  threads:
    virtual:
      enabled: ${VIRTUAL_THREADS_ENABLED:true}
  config:
    import: classpath:db-config.yaml, security-config.yaml, queue-config.yaml
  # for health check
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASSWORD:guest}

management:
  health:
    rabbit:
      enabled: ${QUEUE_ENABLED:false}

documentms.base-url: ${DOCUMENT-SERVICE-BASE-URL:http://localhost:3002}

templatems.base-url: ${TEMPLATE-SERVICE-BASE-URL:http://localhost:3004}

mail:
  enabled: ${MAIL_ENABLED:false}
  defaultFrom: ${MAIL_FROM:no-reply@corems.com}
  host: ${MAIL_HOST}
  port: ${MAIL_PORT}
  username: ${MAIL_USERNAME}
  password: ${MAIL_PASSWORD}
  protocol: ${MAIL_PROTOCOL:SMTPS} # SMTPS (recommended) or SMTP
  properties:
    mail.smtp.auth: ${MAIL_SMTP_AUTH:true}
    mail.smtp.starttls.enable: ${MAIL_STARTTLS:true}

slack:
  enabled: ${SLACK_ENABLED:false}
  senderApp: ${SLACK_SENDER_APP:CoreMS}
  token: ${SLACK_BOT_TOKEN}

sms:
  enabled: ${SMS_ENABLED:false}
  accountSid: ${SMS_ACCOUNT_SID}
  authToken: ${SMS_AUTH_TOKEN}
  fromNumber: ${SMS_FROM_NUMBER}

# Email notification templates
notifications:
  email-templates:
    welcome: ${TEMPLATE_ID_WELCOME:welcome-email}
    email-verification: ${TEMPLATE_ID_EMAIL_VERIFICATION:email-verification}
    password-reset: ${TEMPLATE_ID_PASSWORD_RESET:password-reset-email}
  sms-templates:
    welcome: ${TEMPLATE_ID_SMS_WELCOME:sms-welcome}
    verification-code: ${TEMPLATE_ID_SMS_VERIFICATION:sms-verification}
